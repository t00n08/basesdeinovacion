<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Center - HALO3K</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-arrow-left back-icon" id="menu-close"></i>
                <div class="logo">
                    <span class="logo-icon">H</span>
                    <h1>HALO3K</h1>
                </div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <a href="dashboard.html" class="btn-link"><li><i class="fas fa-home"></i> Dashboard</li></a>
                    <a href="oficinas.html" class="btn-link"><li><i class="fas fa-file-contract"></i> Oficinas</li></a>
                    <a href="analisis.html" class="btn-link"><li><i class="fas fa-chart-pie"></i> Análisis</li></a>
                    <a href="candidatos.html" class="btn-link"><li><i class="fas fa-users"></i> Candidatos</li></a>
                    <a href="datos.html" class="btn-link"><li class="active"><i class="fas fa-database"></i> Datos</li></a>
                    <a href="herramientas.html" class="btn-link"><li><i class="fas fa-wrench"></i> Herramientas</li></a>
                    <a href="info.html" class="btn-link"><li><i class="fas fa-info-circle"></i> Info</li></a>
                    <a href="ayuda.html" class="btn-link"><li><i class="fas fa-question-circle"></i> Ayuda</li></a>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <i class="fas fa-bars mobile-menu-btn" id="menu-toggle" style="font-size: 20px; color: var(--neon-blue); cursor: pointer;"></i>
                    <h2>Data Center</h2>
                </div>
                <div class="user-profile">
                    <div class="user-avatar">DB</div>
                </div>
            </header>

            <div class="content-grid" style="display: grid; grid-template-columns: 1fr; gap: 20px;">
                
                <section class="card neon-border">
                    <div class="search-bar" style="margin-top: 0;">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Buscar registros...">
                    </div>
                </section>

                <section class="card neon-border">
                    <header class="metrics-header">
                        <h3>Registros de Sistema</h3>
                    </header>
                    <div class="table-container" style="width: 100%; overflow-x: auto;">
                        <table style="min-width: 500px;"> <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>INSTITUCIÓN</th>
                                    <th>ESTADO</th>
                                    <th>LINK</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>#HK-21</td>
                                    <td>Liceo A-21</td>
                                    <td><span class="status online">OK</span></td>
                                    <td><i class="fas fa-external-link-alt"></i></td>
                                </tr>
                                <tr>
                                    <td>#HK-45</td>
                                    <td>Duoc UC</td>
                                    <td><span class="status online">OK</span></td>
                                    <td><i class="fas fa-external-link-alt"></i></td>
                                </tr>
                                <tr>
                                    <td>#HK-09</td>
                                    <td>Inacap</td>
                                    <td><span class="status offline">ERR</span></td>
                                    <td><i class="fas fa-external-link-alt"></i></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const menuClose = document.getElementById('menu-close');
        const sidebar = document.getElementById('sidebar');

        if(menuToggle) {
            menuToggle.onclick = () => {
                sidebar.style.left = "0";
            };
        }
        if(menuClose) {
            menuClose.onclick = () => {
                sidebar.style.left = "-100%";
            };
        }
    </script>
</body>
</html>
